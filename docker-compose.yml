version: '3.8'
services:
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/guestHouseDB
    depends_on:
      - mongo

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true 
    depends_on:
      - backend
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
